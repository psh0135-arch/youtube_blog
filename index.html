<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube → 블로그 생성기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      max-width: 680px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #ff4b4b22;
      color: #ff4b4b;
      border: 1px solid #ff4b4b44;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.4rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    h1 span { color: #ff4b4b; }
    .desc {
      color: #aaa;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      text-align: left;
    }
    .feature {
      background: #222;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.88rem;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .feature span { font-size: 1.1rem; }
    .buttons { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #ff4b4b; color: #fff; }
    .btn-secondary { background: #2a2a2a; color: #e8e8e8; border: 1px solid #3a3a3a; }
    .stack {
      margin-top: 2.5rem;
      padding-top: 2rem;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.78rem;
      color: #666;
      background: #222;
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
    }
    .url-box {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .url-input {
      flex: 1;
      background: #222;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 0.92rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .url-input::placeholder { color: #555; }
    .url-input:focus { border-color: #ff4b4b; }
    .url-btn {
      background: #ff4b4b;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .url-btn:hover { opacity: 0.85; }
    .notice {
      background: #1e1e2e;
      border: 1px solid #3a3a55;
      border-radius: 8px;
      color: #888;
      font-size: 0.82rem;
      padding: 0.6rem 1rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    .notice a { color: #ff4b4b; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">📝 AI 블로그 생성기</div>
    <h1>YouTube → <span>한국어 블로그</span> 자동 생성</h1>
    <p class="desc">
      YouTube URL만 입력하면 영상 자막을 분석해<br />
      Google Gemini AI가 한국어 블로그 글을 자동으로 작성합니다.
    </p>
    <div class="url-box">
      <input class="url-input" type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." />
      <button class="url-btn" onclick="handleGenerate()">블로그 생성</button>
    </div>
    <div class="notice" id="notice" style="display:none;"></div>
    <div class="features">
      <div class="feature"><span>🌏</span> 영어 영상도 한국어로 변환</div>
      <div class="feature"><span>⚡</span> 실시간 스트리밍 출력</div>
      <div class="feature"><span>🔗</span> 출처 자동 포함</div>
      <div class="feature"><span>📥</span> Markdown 다운로드</div>
    </div>
    <div class="buttons">
      <a class="btn btn-primary" href="https://github.com/psh0135-arch/youtube-blog-generator" target="_blank">
        ★ GitHub 바로가기
      </a>
      <a class="btn btn-secondary" href="https://github.com/psh0135-arch/youtube-blog-generator#readme" target="_blank">
        📖 사용 방법
      </a>
    </div>
    <div class="stack">
      <span class="tag">Streamlit</span>
      <span class="tag">Google Gemini 2.0 Flash</span>
      <span class="tag">youtube-transcript-api</span>
      <span class="tag">Python 3.12</span>
    </div>
  </div>
  <script>
    function handleGenerate() {
      const val = document.getElementById('urlInput').value.trim();
      const notice = document.getElementById('notice');
      if (!val) {
        notice.style.display = 'block';
        notice.innerHTML = '⚠️ YouTube URL을 입력해주세요.';
        return;
      }
      const isYoutube = /youtube\.com\/watch\?v=|youtu\.be\//.test(val);
      if (!isYoutube) {
        notice.style.display = 'block';
        notice.innerHTML = '⚠️ 올바른 YouTube URL을 입력해주세요.';
        return;
      }
      notice.style.display = 'block';
      notice.innerHTML = '🖥️ 이 페이지는 소개 페이지입니다. 실제 블로그 생성은 로컬에서 <code>streamlit run app.py</code> 실행 후 사용하거나, <a href="https://github.com/psh0135-arch/youtube-blog-generator" target="_blank">GitHub</a>에서 설치해주세요.';
    }
    document.getElementById('urlInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleGenerate();
    });
  </script>
</body>
</html>
